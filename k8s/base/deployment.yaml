apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-ml
  namespace: sentinel
  labels:
    app.kubernetes.io/name: sentinel-ml
    app.kubernetes.io/part-of: sentinel-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentinel-ml
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentinel-ml
        app.kubernetes.io/part-of: sentinel-platform
    spec:
      # Pod-nivå securityContext — UID matchar Dockerfile-användaren.
      # OPA require-non-root + require-runasnonroot kräver detta.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: ml
          # OPA disallow-latest-tag blockerar :latest. CI pushar :main, :latest
          # och :<sha> till Docker Hub; här refererar vi :main för att alltid
          # få senaste main-build vid rollout restart.
          image: jonitsx/sentinel-ml:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8100
              name: http
          envFrom:
            - configMapRef:
                name: sentinel-ml-config
            - secretRef:
                name: sentinel-ml-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 3
            periodSeconds: 5
          # OPA require-resource-limits kräver requests + limits.
          # ML-inferens kan toppa ~400MB för sklearn RandomForest; marginal extra.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          # OPA require-readonly-rootfs. Drop ALL capabilities — least privilege.
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: models
              mountPath: /app/models_store
              readOnly: true
      volumes:
        # /tmp som emptyDir krävs när readOnlyRootFilesystem: true — Python
        # och uvicorn kan skriva temporära filer dit under inferens.
        - name: tmp
          emptyDir: {}
        # models_store är initialt tom — service degraderar till fallback-svar
        # (label="unknown", model_version="none") tills vi bakar in tränade
        # .joblib-filer i image:n (Fas 2). Se docs/security-analysis-deployment.md.
        - name: models
          emptyDir: {}
