# Mall för sentinel-ml:s körnings-secrets.
#
# VIKTIGT — committa INTE secret.yaml till git.
# Lägg till `k8s/base/secret.yaml` i .gitignore innan du skapar den.
#
# Användning:
#   1. cp secret.example.yaml secret.yaml
#   2. Fyll i riktig MONGODB_URI nedan (helst en read-only-användare).
#   3. kubectl apply -f secret.yaml -n sentinel
#   4. CI gör `kubectl rollout restart` vid varje main-push; secret-uppdateringar
#      är manuella ovanpå.

apiVersion: v1
kind: Secret
metadata:
  name: sentinel-ml-secrets
  namespace: sentinel
  labels:
    app.kubernetes.io/name: sentinel-ml
    app.kubernetes.io/part-of: sentinel-platform
type: Opaque
stringData:
  # Format: mongodb+srv://<user>:<pass>@<cluster>.mongodb.net/sentinel_upload?...
  # eller mongodb://<host>:27017/sentinel_upload för lokal/intern Mongo.
  MONGODB_URI: "mongodb+srv://CHANGE_ME:CHANGE_ME@cluster.mongodb.net/sentinel_upload"
